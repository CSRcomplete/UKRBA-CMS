name: Deploy to VPS

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/UKRBA-CMS
            
            # Fetch and hard reset to match remote dev branch exactly
            git fetch origin
            git reset --hard origin/dev
            
            # Install dependencies (ignoring peer dependency conflicts)
            npm install --legacy-peer-deps
            
            # Sync database schema changes
            npx prisma db push
            npx prisma generate
            
            # Build Next.js application
            npm run build

            # Copy static files to standalone directory for Next.js standalone server
            cp -r public .next/standalone/
            mkdir -p .next/standalone/.next
            cp -r .next/static .next/standalone/.next/

            # Restart PM2 process using ecosystem config
            pm2 start ecosystem.config.js
